name: 3-Deploy-to-Production

on:
  release:
    types: [published] # Triggers when you click "Publish Release" in GitHub

env:
  SOLUTION_NAME: 'DeploymentTestSol'

jobs:
  deploy-prod:
    runs-on: windows-latest
    environment: production # Requires manual approval via GitHub Settings

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Power Platform Tools
      uses: microsoft/powerplatform-actions/actions-install@v1

    # 1. Pack the source code directly into a Managed zip package
    # Setting the solution-type to 'Managed' tells the compiler to explicitly
    # convert your unmanaged source text files into a production-ready managed binary.
    - name: Pack Solution as Managed
      uses: microsoft/powerplatform-actions/pack-solution@v1
      with:
        solution-folder: 'solutions/${{ env.SOLUTION_NAME }}'
        solution-file: '${{ env.SOLUTION_NAME }}_managed.zip'
        solution-type: 'Managed' 

    # 2. Import the compiled Managed zip archive into your Production environment
    - name: Import Managed Solution to Production
      uses: microsoft/powerplatform-actions/import-solution@v1
      with:
        environment-url: ${{ secrets.PROD_ENVIRONMENT_URL }}
        app-id: ${{ secrets.PP_CLIENT_ID }}
        tenant-id: ${{ secrets.PP_TENANT_ID }}
        client-secret: ${{ secrets.PP_CLIENT_SECRET }}
        solution-file: '${{ env.SOLUTION_NAME }}_managed.zip'
        force-overwrite: true
        publish-changes: true
