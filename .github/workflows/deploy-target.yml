name: 2-Pack-and-Deploy-Target
on:
  push:
    branches:
      - main
    paths:
      - 'solutions/DeploymentTestSol/**'
  workflow_dispatch: # <--- This adds a manual "Run workflow" button


env:
  SOLUTION_NAME: 'DeploymentTestSol'

jobs:
  deploy:
    runs-on: windows-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Power Platform Tools
      uses: microsoft/powerplatform-actions/actions-install@v1

      # Clear out any old cached zip packages from prior runs
    - name: Clean Workspace Packages
      run: |
        if (Test-Path "${{ env.SOLUTION_NAME }}.zip") { Remove-Item "${{ env.SOLUTION_NAME }}.zip" -Force }
        if (Test-Path "${{ env.SOLUTION_NAME }}_managed.zip") { Remove-Item "${{ env.SOLUTION_NAME }}_managed.zip" -Force }
      shell: powershell

    # 1. Pack the source code files back into a Managed Zip file
    - name: Pack Solution as Managed
      uses: microsoft/powerplatform-actions/pack-solution@v1
      with:
        solution-folder: 'solutions/${{ env.SOLUTION_NAME }}'
        solution-file: '${{ env.SOLUTION_NAME }}.zip'
        solution-type: 'Unmanaged'

    # 2. Import the managed zip file directly into the Test environment
    - name: Import Solution to Test Environment
      uses: microsoft/powerplatform-actions/import-solution@v1
      with:
        environment-url: ${{ secrets.TEST_ENVIRONMENT_URL }}
        app-id: ${{ secrets.PP_CLIENT_ID }} # Fixed from client-id to app-id
        tenant-id: ${{ secrets.PP_TENANT_ID }}
        client-secret: ${{ secrets.PP_CLIENT_SECRET }}
        solution-file: '${{ env.SOLUTION_NAME }}.zip'
        import-as-managed: true # <--- This handles the conversion perfectly
        force-overwrite: true
        publish-changes: true
