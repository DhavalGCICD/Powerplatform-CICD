name: 1-Export-and-Unpack-Solution

on:
  workflow_dispatch:
    inputs:
      solution_name:
        description: 'Name of the Power Platform Solution (Unique Name)'
        required: true
        default: 'DeploymentTestSol'
      environment_url:
        description: 'Dev Environment URL'
        required: true
        default: 'DEV_ENVIRONMENT_URL'

permissions:
  contents: write

jobs:
  export-from-dev:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Power Platform Tools
      uses: microsoft/powerplatform-actions/actions-install@v1

    # 1. Export Unmanaged Solution
    - name: Export Unmanaged Solution
      uses: microsoft/powerplatform-actions/export-solution@v1
      with:
        environment-url: ${{ secrets.DEV_ENVIRONMENT_URL }}
        app-id: ${{ secrets.PP_CLIENT_ID }} # Fixed from client-id to app-id
        tenant-id: ${{ secrets.PP_TENANT_ID }}
        client-secret: ${{ secrets.PP_CLIENT_SECRET }}
        solution-name: ${{ github.event.inputs.solution_name }}
        solution-output-file: '${{ github.event.inputs.solution_name }}_unmanaged.zip'

    # 2. Unpack the solution
    - name: Unpack Solution
      uses: microsoft/powerplatform-actions/unpack-solution@v1
      with:
        solution-file: '${{ github.event.inputs.solution_name }}_unmanaged.zip'
        solution-folder: 'solutions/${{ github.event.inputs.solution_name }}'
        solution-type: 'Unmanaged'
        overwrite-files: true

    # 3. Commit back into your GitHub Repository
    - name: Commit and Push to Source Control
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add solutions/${{ github.event.inputs.solution_name }}
        git commit -m "Exported and unpacked solution: ${{ github.event.inputs.solution_name }}"
        git push
